<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Templates</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 13px; color: #323130; background: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { padding: 12px 14px; background: #f3f2f1; border-bottom: 1px solid #edebe9; flex-shrink: 0; }
    .header h1 { font-size: 14px; font-weight: 600; color: #323130; }
    .search-wrap { padding: 10px 14px; border-bottom: 1px solid #edebe9; flex-shrink: 0; }
    .search-wrap input { width: 100%; padding: 6px 10px; border: 1px solid #8a8886; border-radius: 2px; font-size: 13px; font-family: inherit; outline: none; color: #323130; }
    .search-wrap input:focus { border-color: #0078d4; box-shadow: 0 0 0 1px #0078d4; }
    .template-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .template-item { padding: 10px 14px 12px; border-bottom: 1px solid #f3f2f1; }
    .template-item:hover { background: #f3f2f1; }
    .template-item:hover .insert-btn { opacity: 1; }
    .template-title { font-weight: 600; font-size: 13px; color: #323130; margin-bottom: 3px; }
    .template-preview { font-size: 11px; color: #605e5c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
    .insert-btn { padding: 4px 14px; background: #0078d4; color: #fff; border: none; border-radius: 2px; font-size: 12px; font-family: inherit; cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s; }
    .insert-btn:hover { background: #106ebe; }
    .state-msg { padding: 24px 14px; text-align: center; color: #605e5c; font-size: 12px; line-height: 1.6; }
    .state-msg.error { color: #a4262c; }
    .status-bar { padding: 7px 14px; font-size: 11px; border-top: 1px solid #edebe9; min-height: 30px; color: #605e5c; flex-shrink: 0; }
    .status-bar.success { color: #107c10; font-weight: 600; }
    .status-bar.error { color: #a4262c; font-weight: 600; }
    .version-footer { padding: 4px 14px; font-size: 10px; color: #a19f9d; text-align: right; border-top: 1px solid #f3f2f1; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="header"><h1>Email Templates</h1></div>
  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="Search templates…" oninput="filterTemplates()" />
  </div>
  <div class="template-list" id="templateList">
    <div class="state-msg">Loading templates…</div>
  </div>
  <div class="status-bar" id="statusBar"></div>
  <div class="version-footer">v1.0.0.3</div>

  <script>
    const TEMPLATES_URL = "https://bngoapn.github.io/apn-email-templates/templates.json";

    let allTemplates = [];
    let filteredTemplates = [];

    Office.onReady(function () {
      loadTemplates();
    });

    async function loadTemplates() {
      try {
        const response = await fetch(TEMPLATES_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        allTemplates = await response.json();
        filterTemplates();
      } catch (err) {
        document.getElementById("templateList").innerHTML =
          `<div class="state-msg error">Could not load templates.<br/><small>${escapeHtml(err.message)}</small><br/><br/><small>Contact IT if this persists.</small></div>`;
      }
    }

    function filterTemplates() {
      const query = document.getElementById("searchBox").value.toLowerCase().trim();
      filteredTemplates = query
        ? allTemplates.filter(t => t.title.toLowerCase().includes(query) || (t.body || "").toLowerCase().includes(query))
        : allTemplates;
      renderTemplates();
    }

    function renderTemplates() {
      const listEl = document.getElementById("templateList");
      if (filteredTemplates.length === 0) {
        listEl.innerHTML = allTemplates.length === 0
          ? `<div class="state-msg">No templates have been added yet.</div>`
          : `<div class="state-msg">No templates match your search.</div>`;
        return;
      }
      listEl.innerHTML = filteredTemplates.map((t, index) => {
        const preview = (t.body || "").replace(/\n/g, " ").substring(0, 110);
        return `<div class="template-item">
          <div class="template-title">${escapeHtml(t.title)}</div>
          <div class="template-preview">${escapeHtml(preview)}…</div>
          <button class="insert-btn" onclick="insertTemplate(${index})">Insert</button>
        </div>`;
      }).join("");
    }

    function insertTemplate(index) {
      const template = filteredTemplates[index];
      if (!template) return;
      const statusEl = document.getElementById("statusBar");
      Office.context.mailbox.item.body.setSelectedDataAsync(
        template.body || "",
        { coercionType: Office.CoercionType.Text },
        function (result) {
          if (result.status === Office.AsyncResultStatus.Succeeded) {
            statusEl.textContent = "✓ Template inserted.";
            statusEl.className = "status-bar success";
          } else {
            statusEl.textContent = "✗ Insert failed — please try again.";
            statusEl.className = "status-bar error";
          }
          setTimeout(() => { statusEl.textContent = ""; statusEl.className = "status-bar"; }, 3000);
        }
      );
    }

    function escapeHtml(str) {
      return (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
